  # SD-JWT VC credential configurations synced from waltid-credentials.
  "asit.tax-id-credential" = {
    format = "dc+sd-jwt"
    scope = "asit.tax-id-credential"
    # Use exactly "vctBaseUrl" to publish <configured service base URL>/openid4vci/<credential configuration id> as the VCT.
    # Wallets resolve that VCT through /.well-known/vct/<credential configuration id>; any other string is published unchanged.
    vct = "vctBaseUrl"
    credential_signing_alg_values_supported = ["ES256"]
    cryptographic_binding_methods_supported = ["jwk", "did:key", "did:web", "did:jwk", "did:ebsi"]
