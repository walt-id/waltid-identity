publicBaseUrl = "http://localhost:${WALLET_API2_PORT}"
publicBaseUrl = ${?WALLET2_PUBLIC_BASE_URL}

# Wallet attestation provider. The flows build OAuth-Client-Attestation
# headers automatically for issuers that advertise attest_jwt_client_auth.
attestationConfig {
  attesterUrl = "https://wallet-provider.eudiw.dev/wallet-instance-attestation/jwk"
  requestBody {
    jwk = "{{public_jwk}}"
  }
}
