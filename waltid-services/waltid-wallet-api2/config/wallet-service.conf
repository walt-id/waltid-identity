publicBaseUrl = "http://localhost:4000"

# Wallet attestation provider. The full receive flow builds OAuth-Client-Attestation
# headers automatically for issuers that advertise attest_jwt_client_auth.
attestationConfig {
  attesterUrl = "https://wallet-provider.eudiw.dev/wallet-instance-attestation/jwk"
  requestBody {
    jwk = "{{public_jwk}}"
  }
}
