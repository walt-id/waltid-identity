# Credential Configurations (OpenID4VCI metadata)
# These define the credential types supported by the issuer
# and are exposed via the /.well-known/openid-credential-issuer endpoint

credentialConfigurations = {

    # ============================================
    # SD-JWT VC Configuration
    # Format: dc+sd-jwt (SD-JWT Verifiable Credential)
    # ============================================
    identity_credential = {
        format = "dc+sd-jwt"
        scope = "identity_credential"
        vct = "https://example.com/identity_credential"
        cryptographic_binding_methods_supported = ["did:key", "did:jwk", "jwk"]
        credential_signing_alg_values_supported = ["ES256"]
        proof_types_supported = {
            jwt = {
                proof_signing_alg_values_supported = ["ES256"]
            }
        }
        display = [
            {
                name = "Identity Credential"
                locale = "en"
                description = "A verifiable identity credential containing personal information"
            }
        ]
        claims = {
            given_name = {
                display = [{ name = "Given Name", locale = "en" }]
            }
            family_name = {
                display = [{ name = "Family Name", locale = "en" }]
            }
            email = {
                display = [{ name = "Email Address", locale = "en" }]
            }
            birthdate = {
                display = [{ name = "Date of Birth", locale = "en" }]
            }
        }
    }

    # ============================================
    # W3C JWT VC Configuration
    # Format: jwt_vc_json (W3C VC Data Model 1.1 as JWT)
    # ============================================
    OpenBadgeCredential_jwt_vc_json = {
        format = "jwt_vc_json"
        scope = "OpenBadgeCredential"
        cryptographic_binding_methods_supported = ["did:key", "did:jwk"]
        credential_signing_alg_values_supported = ["ES256"]
        proof_types_supported = {
            jwt = {
                proof_signing_alg_values_supported = ["ES256"]
            }
        }
        credential_definition = {
            "@context" = [
                "https://www.w3.org/2018/credentials/v1",
                "https://purl.imsglobal.org/spec/ob/v3p0/context.json"
            ]
            type = ["VerifiableCredential", "OpenBadgeCredential"]
        }
        display = [
            {
                name = "OpenBadge Credential"
                locale = "en"
                description = "An OpenBadge verifiable credential for achievements and certifications"
                background_color = "#12107c"
                text_color = "#FFFFFF"
            }
        ]
    }

    # ============================================
    # W3C VC-JWT Configuration (alternative format)
    # Format: vc+sd-jwt (W3C VC with SD-JWT)
    # ============================================
    UniversityDegree_vc_sd_jwt = {
        format = "vc+sd-jwt"
        scope = "UniversityDegree"
        vct = "https://example.com/university_degree"
        cryptographic_binding_methods_supported = ["did:key", "did:jwk"]
        credential_signing_alg_values_supported = ["ES256"]
        proof_types_supported = {
            jwt = {
                proof_signing_alg_values_supported = ["ES256"]
            }
        }
        display = [
            {
                name = "University Degree"
                locale = "en"
                description = "A verifiable university degree credential"
                background_color = "#1a4b8c"
                text_color = "#FFFFFF"
            }
        ]
    }

    # ============================================
    # mDL Configuration (Mobile Driving License)
    # Format: mso_mdoc (ISO 18013-5)
    # Note: Uses COSE algorithm identifiers (-7 = ES256)
    # ============================================
    "org.iso.18013.5.1.mDL" = {
        format = "mso_mdoc"
        scope = "org.iso.18013.5.1.mDL"
        doctype = "org.iso.18013.5.1.mDL"
        cryptographic_binding_methods_supported = ["cose_key"]
        # COSE algorithm identifiers: -7 = ES256, -35 = ES384, -36 = ES512
        credential_signing_alg_values_supported = [-7]
        proof_types_supported = {
            jwt = {
                proof_signing_alg_values_supported = ["ES256"]
            }
        }
        display = [
            {
                name = "Mobile Driving License"
                locale = "en"
                description = "ISO 18013-5 compliant mobile driving license"
                background_color = "#004d99"
                text_color = "#FFFFFF"
            }
        ]
        claims = {
            "org.iso.18013.5.1" = {
                family_name = {
                    display = [{ name = "Family Name", locale = "en" }]
                    mandatory = true
                }
                given_name = {
                    display = [{ name = "Given Name", locale = "en" }]
                    mandatory = true
                }
                birth_date = {
                    display = [{ name = "Date of Birth", locale = "en" }]
                    mandatory = true
                }
                issue_date = {
                    display = [{ name = "Issue Date", locale = "en" }]
                    mandatory = true
                }
                expiry_date = {
                    display = [{ name = "Expiry Date", locale = "en" }]
                    mandatory = true
                }
                issuing_country = {
                    display = [{ name = "Issuing Country", locale = "en" }]
                    mandatory = true
                }
                document_number = {
                    display = [{ name = "Document Number", locale = "en" }]
                    mandatory = true
                }
                driving_privileges = {
                    display = [{ name = "Driving Privileges", locale = "en" }]
                    mandatory = true
                }
                portrait = {
                    display = [{ name = "Portrait", locale = "en" }]
                }
            }
        }
    }

