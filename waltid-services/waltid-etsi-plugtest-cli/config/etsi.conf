# ETSI Plugtest CLI Configuration
# ================================
#
# Place this file at: config/etsi.conf
#
# Configuration follows HOCON format (Human-Optimized Config Object Notation)
# https://github.com/lightbend/config/blob/main/HOCON.md
#
# Config file search order:
#   1. --config CLI option (if provided)
#   2. config/etsi.conf (relative to working directory)
#   3. etsi.conf (relative to working directory)
#   4. ~/.config/waltid/etsi.conf

# Issuer configuration
issuer {
    # Path to issuer JWK key file
    # keyFile = "/path/to/issuer-key.jwk"
    
    # Or provide the JWK inline (alternative to keyFile)
    # keyJwk = """
    # {
    #   "type": "jwk",
    #   "jwk": {
    #     "kty": "EC",
    #     "d": "your-private-key-d",
    #     "crv": "P-256",
    #     "kid": "issuer-key-id",
    #     "x": "your-public-key-x",
    #     "y": "your-public-key-y"
    #   }
    # }
    # """
    
    # Path to issuer certificate PEM file (X.509 certificate chain)
    # certificateFile = "/path/to/issuer-cert.pem"
    
    # Or provide the certificate inline (alternative to certificateFile)
    # certificatePem = """
    # -----BEGIN CERTIFICATE-----
    # MIICCTCCAbCgAwIBAgIU...
    # -----END CERTIFICATE-----
    # """
    
    # Issuer URL (used in SD-JWT-VC 'iss' claim)
    url = "https://issuer.walt.id"
}

# Holder configuration (for key binding)
holder {
    # Path to holder JWK key file
    # keyFile = "/path/to/holder-key.jwk"
    
    # Or provide the JWK inline
    # keyJwk = """
    # {
    #   "type": "jwk",
    #   "jwk": { ... }
    # }
    # """
}

# Output configuration
output {
    # Output directory for generated files
    directory = "output"
    
    # File name pattern
    # Supported placeholders: {testCaseId}
    fileNamePattern = "{testCaseId}"
}

# SD-JWT-VC specific configuration
sdjwt {
    # Verifiable Credential Type (vct claim)
    vct = "urn:etsi:eaa:credential"
    
    # Integrity algorithm for vct#integrity claim
    vctIntegrityAlgorithm = "sha256"
}

# mdoc specific configuration
mdoc {
    # Default document type (docType)
    defaultDocType = "org.etsi.eaa.1"
    
    # Default namespace
    defaultNamespace = "org.etsi.01947201.010101"
}
