api:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: http-api
  replicas: 1
  type: ClusterIP
  issuerApi:
    image:
      repository: waltid/issuer-api
      tag: latest
      imagePullPolicy: Always

configFiles:
  _features.conf: |-
    enabledFeatures = [
        entra
    ]
  web.conf: |-
    webHost = "0.0.0.0"
    webPort = 3000
  issuer-service.conf: |-
    baseUrl = "https://{{ .Values.ingress.host }}"

ingress:
  ingressClassName: traefik # nginx
  host: issuer.portal.waltid.cloud