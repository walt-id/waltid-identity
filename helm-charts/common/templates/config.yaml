{{- if .Values.configFiles }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.fullname" . }}-config
  labels:
    {{- include "common.labels" . | nindent 4 }}
data:
  {{- range $name, $content := .Values.configFiles }}
  {{ $name }}: |
    {{- tpl $content $ | nindent 4 }}
  {{- end }}
{{- end }}
