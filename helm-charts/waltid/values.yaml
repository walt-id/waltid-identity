portal:
  api:
    containerPort: 3000
    image:
      repository: waltid/portal
      tag: latest
      imagePullPolicy: Always
  env:
    NEXT_PUBLIC_VC_REPO: "https://credentials.walt.id"
    NEXT_PUBLIC_ISSUER: "https://issuer.portal.test.waltid.cloud"
    NEXT_PUBLIC_VERIFIER: "https://verifier.portal.test.waltid.cloud"
    NEXT_PUBLIC_VERIFIER2: "https://verifier2.portal.waltid.cloud"
    NEXT_PUBLIC_WALLET: "https://wallet.test.waltid.cloud"
  ingress:
    ingressClassName: "traefik"
    clusterIssuer: letsencrypt-prod
    tls:
      - hosts:
          - portal.test.waltid.cloud
        secretName: portal-tls-secret
    host: portal.test.waltid.cloud

portal2:
  api:
    containerPort: 3000
    image:
      repository: waltid/portal2
      tag: latest
      imagePullPolicy: Always
  env:
    NUXT_PUBLIC_ISSUER_BASE: "https://issuer2.portal.test.waltid.cloud"
    NUXT_PUBLIC_VERIFIER_BASE: "https://verifier2.portal.test.waltid.cloud"
    NUXT_PUBLIC_WALLET_URL: "https://wallet.test.waltid.cloud"
  ingress:
    ingressClassName: "traefik"
    clusterIssuer: letsencrypt-prod
    tls:
      - hosts:
          - portal2.test.waltid.cloud
        secretName: portal2-tls-secret
    host: portal2.test.waltid.cloud

web-wallet:
  pvc:
    dataVolumeClaim:
      accessMode: ReadWriteOnce
      storageClass: gp3-retain
      storageRequest: 1Gi
  configFiles:
    oidc.conf: |-
      publicBaseUrl = "https://wallet-dev.test.waltid.cloud"
      providerName = keycloak
      oidcRealm = "https://keycloak.walt-test.cloud/realms/waltid-keycloak-ktor"
      oidcJwks = "${oidcRealm}/protocol/openid-connect/certs"
      authorizeUrl = "${oidcRealm}/protocol/openid-connect/auth"
      accessTokenUrl = "${oidcRealm}/protocol/openid-connect/token"
      logoutUrl = "${oidcRealm}/protocol/openid-connect/logout"
      clientId = "wallet_backend_prod"
      clientSecret = "__DEFAULT_KEYCLOAK_CLIENT_SECRET__"
      keycloakUserApi = "https://keycloak.walt-test.cloud/admin/realms/waltid-keycloak-ktor/users"
      jwksCache = {
          cacheSize = 10
          cacheExpirationHours = 24
          rateLimit: {
              bucketSize: 10
              refillRateMinutes: 1
          }
      }
  walletConfig:
    authConf: |-
      encryptionKey = "oshaaddgtwcqvcsg"
      signKey = "gyccmrunkqwnzswl"
      tokenKey = "bsbybnzroezpsttdeerwjiymkqzzlxqz"
      tokenLifetime = "30"
      audTokenClaim = "https://wallet.walt.id"
      issTokenClaim = "https://wallet.walt.id"
  web:
    credentialsRepository:
      host: credentials.walt.id
    devUi:
      host: wallet-dev.test.waltid.cloud
    demoUi:
      host: wallet.test.waltid.cloud
  ingress:
    ingressClassName: "traefik"
    clusterIssuer: letsencrypt-prod
    tls:
      - hosts:
          - wallet-dev.test.waltid.cloud
          - wallet.test.waltid.cloud
        secretName: wallet-tls-secret

wallet-api2:
  api:
    containerPort: 7005
    image:
      repository: waltid/wallet-api2
      tag: latest
      imagePullPolicy: Always
  configMountPath: /waltid-wallet-api2/config
  persistence:
    enabled: true
    mountPath: /waltid-wallet-api2/data/
    accessMode: ReadWriteOnce
    storageClass: gp3-retain
    storageRequest: 1Gi
  ingress:
    ingressClassName: "traefik"
    clusterIssuer: letsencrypt-prod
    tls:
      - hosts:
          - wallet-api2.portal.test.waltid.cloud
        secretName: wallet-api2-tls-secret
    host: wallet-api2.portal.test.waltid.cloud