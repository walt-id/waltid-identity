issuer:
  api:
    containerPort: 7002
    image:
      repository: waltid/issuer-api
      tag: latest
      imagePullPolicy: Always
  configMountPath: /waltid-issuer-api/config
  configFiles:
    _features.conf: |-
      enabledFeatures = [
          entra
      ]
    issuer-service.conf: |-
      baseUrl = "https://{{ .Values.ingress.host }}"
  ingress:
    ingressClassName: "traefik"
    clusterIssuer: letsencrypt-prod
    tls:
      - hosts:
          - issuer.portal.test.waltid.cloud
        secretName: issuer-tls-secret
    host: issuer.portal.test.waltid.cloud

issuer2:
  api:
    containerPort: 7002
    image:
