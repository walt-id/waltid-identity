name: cocoapods-setup
description: cocoapods-setup
inputs:
  cocoapods-version:
    description: 'Specific CocoaPods version to install (optional)'
    required: false
    default: ''
  xcodeproj-version:
    description: 'Specific xcodeproj version to install (optional)'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Setup CocoaPods
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${{ inputs.cocoapods-version }}" != "" ]]; then
          echo "Installing CocoaPods version ${{ inputs.cocoapods-version }}"
          gem install cocoapods -v ${{ inputs.cocoapods-version }} --no-document
        else
          echo "Installing latest CocoaPods"
          gem install cocoapods --no-document
        fi

        if [[ "${{ inputs.xcodeproj-version }}" != "" ]]; then
          echo "Installing xcodeproj version ${{ inputs.xcodeproj-version }}"
          gem install xcodeproj -v ${{ inputs.xcodeproj-version }} --no-document
        elif [[ "${{ inputs.cocoapods-version }}" == "" ]]; then
          echo "Installing latest xcodeproj"
          gem install xcodeproj --no-document
        else
          echo "Using xcodeproj version resolved by CocoaPods dependencies"
        fi
        
        # Only update repo if cache miss or forced
        if [[ ! -d ~/.cocoapods/repos/trunk/.git ]] || [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
          echo "Updating CocoaPods repository..."
          pod repo update --silent
        else
          echo "Using cached CocoaPods repository"
        fi
