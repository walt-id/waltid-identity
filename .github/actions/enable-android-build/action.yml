name: enable-android-build
description: Updates gradle.properties to enable Android builds
inputs:
  gradle-properties-path:
    description: 'Path to gradle.properties file'
    required: true
runs:
  using: "composite"
  steps:
    - name: Enable Android build
      shell: bash
      run: |
        set -euo pipefail

        GRADLE_PROPS="${{ inputs.gradle-properties-path }}"

        if [[ ! -f "$GRADLE_PROPS" ]]; then
          echo "::error::gradle.properties file not found at $GRADLE_PROPS"
          exit 1
        fi

        # Create backup
        cp "$GRADLE_PROPS" "$GRADLE_PROPS.backup"

        # Enable Android build - handle both cases where property exists or doesn't
        if grep -q "enableAndroidBuild" "$GRADLE_PROPS"; then
          sed -i 's/enableAndroidBuild=false/enableAndroidBuild=true/g' "$GRADLE_PROPS"
          echo "Updated existing enableAndroidBuild property"
        else
          echo "enableAndroidBuild=true" >> "$GRADLE_PROPS"
          echo "Added enableAndroidBuild property"
        fi

        # Verify the change
        if grep -q "enableAndroidBuild=true" "$GRADLE_PROPS"; then
          echo "✅ Android build successfully enabled"
        else
          echo "::error::Failed to enable Android build"
          exit 1
        fi
