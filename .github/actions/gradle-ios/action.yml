name: gradle-ios
description: gradle-ios
inputs:
  waltid-directory:
    description: 'Path waltid-identity directory'
    required: false
    type: string
    default: '.'
runs:
  using: "composite"
  steps:
    - name: Configure iOS build environment
      uses: ./waltid-identity/.github/actions/ios-build-setup
      with:
        gradle-properties-path: '${{ inputs.waltid-directory }}/gradle.properties'

    - name: Install CocoaPods dependencies for iOS libraries
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: ./gradlew podInstall

    - name: Build iOS simulator frameworks (ARM64)
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: ./gradlew clean linkPodDebugFrameworkIosSimulatorArm64

    - name: Execute crypto iOS tests
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: |
        ./gradlew :waltid-libraries:crypto:waltid-crypto-ios:iosSimulatorArm64Test --info
        ./gradlew :waltid-libraries:sdjwt:waltid-sdjwt-ios:iosSimulatorArm64Test --info

    - name: Build shared framework for iOS app (CocoaPods location)
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: |
        ./gradlew :waltid-applications:waltid-wallet-demo-ios:shared:syncFramework \
          -Pkotlin.native.cocoapods.platform=iphonesimulator \
          -Pkotlin.native.cocoapods.archs="arm64" \
          -Pkotlin.native.cocoapods.configuration=Debug

    - name: Install CocoaPods for iOS app
      working-directory: ${{ inputs.waltid-directory }}/waltid-applications/waltid-wallet-demo-ios/iosApp
      shell: bash
      run: pod install

    - name: Execute iOS demo app unit tests
      working-directory: ${{ inputs.waltid-directory }}/waltid-applications/waltid-wallet-demo-ios/iosApp
      shell: bash
      run: |
        xcodebuild test \
          -workspace iosApp.xcworkspace \
          -scheme iosApp \
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
          -only-testing:iosAppTests \
          OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES

    - name: Prepare simulator for UI tests
      shell: bash
      run: |
        # Get the simulator UUID for iPhone 17
        SIMULATOR_UUID=$(xcrun simctl list devices available | grep "iPhone 17 (" | grep -v "Pro" | head -1 | sed -E 's/.*\(([0-9A-F-]+)\).*/\1/')
        echo "Using simulator: $SIMULATOR_UUID"

        # Boot the simulator explicitly
        xcrun simctl boot "$SIMULATOR_UUID" || true

        # Wait for it to be ready
        timeout 60 bash -c "while ! xcrun simctl list devices | grep '$SIMULATOR_UUID' | grep -q Booted; do sleep 1; done" || true

        # Set privacy permissions to avoid prompts
        xcrun simctl privacy "$SIMULATOR_UUID" grant all id.walt.iosApp || true

        echo "Simulator ready: $SIMULATOR_UUID"

    - name: Execute iOS demo app UI tests (EUDI public backend only)
      working-directory: ${{ inputs.waltid-directory }}/waltid-applications/waltid-wallet-demo-ios/iosApp
      shell: bash
      run: |
        # Capture simulator logs in background
        SIMULATOR_UUID=$(xcrun simctl list devices available | grep "iPhone 17 (" | grep -v "Pro" | head -1 | sed -E 's/.*\(([0-9A-F-]+)\).*/\1/')
        echo "Starting log capture for simulator: $SIMULATOR_UUID"
        xcrun simctl spawn "$SIMULATOR_UUID" log stream --predicate 'processImagePath contains "iosApp"' > test-simulator.log 2>&1 &
        LOG_PID=$!

        # Run tests with detailed output
        set +e
        xcodebuild test \
          -workspace iosApp.xcworkspace \
          -scheme iosApp \
          -destination "id=$SIMULATOR_UUID" \
          -only-testing:iosAppUITests/EudiPublicBackendE2ETests \
          -resultBundlePath TestResults \
          -derivedDataPath DerivedData \
          -enableCodeCoverage NO \
          OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES 2>&1 | tee xcodebuild-output.log
        TEST_EXIT_CODE=$?
        set -e

        # Stop log capture
        kill $LOG_PID 2>/dev/null || true

        # Show last 100 lines of app logs
        echo "=== Last 100 lines of app logs ==="
        tail -100 test-simulator.log || echo "No app logs captured"

        exit $TEST_EXIT_CODE

    - name: Upload iOS test results and logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-ui-test-results
        path: |
          ${{ inputs.waltid-directory }}/waltid-applications/waltid-wallet-demo-ios/iosApp/TestResults.xcresult
          ${{ inputs.waltid-directory }}/waltid-applications/waltid-wallet-demo-ios/iosApp/test-simulator.log
          ${{ inputs.waltid-directory }}/waltid-applications/waltid-wallet-demo-ios/iosApp/xcodebuild-output.log
        retention-days: 7
