name: gradle-ios
description: gradle-ios
inputs:
  waltid-directory:
    description: 'Path waltid-identity directory'
    required: false
    type: string
    default: '.'
runs:
  using: "composite"
  steps:
    - name: Configure iOS build environment
      uses: walt-id/waltid-identity/.github/actions/ios-build-setup@6eb327cce1c4d04e3e84caac9695cfda9f7ad66a
      with:
        gradle-properties-path: '${{ inputs.waltid-directory }}/gradle.properties'

    - name: Compile iOS targets
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: ./gradlew :waltid-libraries:crypto:waltid-crypto:compileKotlinIosSimulatorArm64

    - name: Execute iOS simulator tests (ARM64)
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: |
        ./gradlew :waltid-libraries:crypto:waltid-crypto:iosSimulatorArm64Test --info

    - name: Compile wallet modules for iOS
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: |
        ./gradlew :waltid-libraries:protocols:waltid-openid4vc-wallet-client:compileKotlinIosSimulatorArm64
        ./gradlew :waltid-libraries:protocols:waltid-openid4vc-wallet-persistence:compileKotlinIosSimulatorArm64