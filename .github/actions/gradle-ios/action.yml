name: gradle-ios
description: gradle-ios
inputs:
  waltid-directory:
    description: 'Path waltid-identity directory'
    required: false
    type: string
    default: '.'
runs:
  using: "composite"
  steps:
    - name: Configure iOS build environment
      uses: ./waltid-identity/.github/actions/ios-build-setup
      with:
        gradle-properties-path: '${{ inputs.waltid-directory }}/gradle.properties'

    - name: Install CocoaPods dependencies for iOS libraries
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: ./gradlew podInstall

    - name: Build iOS simulator frameworks (ARM64)
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: ./gradlew clean linkPodDebugFrameworkIosSimulatorArm64

    - name: Execute crypto iOS tests
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: |
        ./gradlew :waltid-libraries:crypto:waltid-crypto-ios:iosSimulatorArm64Test --info
        ./gradlew :waltid-libraries:sdjwt:waltid-sdjwt-ios:iosSimulatorArm64Test --info

    - name: Build shared framework for iOS app (CocoaPods location)
      working-directory: ${{ inputs.waltid-directory }}
      shell: bash
      run: |
        ./gradlew :waltid-applications:waltid-wallet-demo-ios:shared:syncFramework \
          -Pkotlin.native.cocoapods.platform=iphonesimulator \
          -Pkotlin.native.cocoapods.archs="arm64" \
          -Pkotlin.native.cocoapods.configuration=Debug

    - name: Install CocoaPods for iOS app
      working-directory: ${{ inputs.waltid-directory }}/waltid-applications/waltid-wallet-demo-ios/iosApp
      shell: bash
      run: pod install

    - name: Execute iOS demo app unit tests
      working-directory: ${{ inputs.waltid-directory }}/waltid-applications/waltid-wallet-demo-ios/iosApp
      shell: bash
      run: |
        xcodebuild test \
          -workspace iosApp.xcworkspace \
          -scheme iosApp \
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
          -only-testing:iosAppTests \
          OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES
