name: Build and test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    paths-ignore: &docs-and-assets
      - '**/*.md'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.webp'
      - '**/*.svg'
      - '**/*.ico'
      - '**/LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore: *docs-and-assets

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  version:
    uses: ./.github/workflows/version.yml
  android-eligibility:
    uses: ./.github/workflows/android-eligibility.yml
    with:
      event-name: ${{ github.event_name }}
      ref: ${{ github.ref }}
      pr-number: ${{ github.event.pull_request.number || '' }}
      pr-head-repo: ${{ github.event.pull_request.head.repo.full_name || '' }}
      pr-labels: ${{ toJson(github.event.pull_request.labels.*.name) }}
      pr-draft: ${{ github.event.pull_request.draft || false }}
  macos-eligibility:
    uses: ./.github/workflows/macos-eligibility.yml
    with:
      event-name: ${{ github.event_name }}
      ref: ${{ github.ref }}
      pr-number: ${{ github.event.pull_request.number || '' }}
      pr-head-repo: ${{ github.event.pull_request.head.repo.full_name || '' }}
      pr-labels: ${{ toJson(github.event.pull_request.labels.*.name) }}
      pr-draft: ${{ github.event.pull_request.draft || false }}
  sdk-docs:
    uses: ./.github/workflows/mobile-sdk-docs.yml
    needs: macos-eligibility
    if: ${{ needs.macos-eligibility.outputs.should-run == 'true' }}
    secrets: inherit
  ios-tests:
    uses: ./.github/workflows/gradle-macos.yml
    needs: macos-eligibility
    if: ${{ needs.macos-eligibility.outputs.should-run == 'true' }}
    secrets: inherit
  android-device-tests:
    uses: ./.github/workflows/android-device-tests.yml
    needs: android-eligibility
    if: ${{ needs.android-eligibility.outputs.should-run == 'true' }}
    secrets: inherit
  gradle-build:
    uses: ./.github/workflows/gradle.yml
    secrets: inherit
    needs:
      - android-eligibility
      - version
    with:
      version: ${{ needs.version.outputs.release_version }}
      enable-android-build: ${{ needs.android-eligibility.outputs.should-run == 'true' }}
      report-check-name: 'gradle-build / gradle (ubuntu-22.04)'
