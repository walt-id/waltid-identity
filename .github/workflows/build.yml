name: Build on every push except main branch

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    uses: walt-id/waltid-identity/.github/workflows/reusable/version.yml@53249535bf6e3d7257e9535ca3e9ff69472542b9
  gradle-build:
    uses: walt-id/waltid-identity/.github/workflows/reusable/gradle.yml@53249535bf6e3d7257e9535ca3e9ff69472542b9
    needs: version
    with:
      version: ${{ needs.version.outputs.release_version }}
  docker-matrix:
    uses: walt-id/waltid-identity/.github/workflows/reusable/load-json.yml@53249535bf6e3d7257e9535ca3e9ff69472542b9
    with:
      jsonpath: ".github/workflows/data/docker-matrix.json"
  docker:
    uses: walt-id/waltid-identity/.github/workflows/reusable/docker.yml@53249535bf6e3d7257e9535ca3e9ff69472542b9
    needs: [ version, docker-matrix ]
    with:
      images: ${{ needs.docker-matrix.outputs.json }}
      version: ${{ needs.version.outputs.release_version }}
      artifact: true
  ebsi-ct-v3:
    uses: walt-id/waltid-identity/.github/workflows/reusable/ebsictv3.yml@53249535bf6e3d7257e9535ca3e9ff69472542b9
    needs: [ version, docker ]
    secrets: inherit
    with:
      artifact: issuer-api
      tag: "waltid/issuer-api:${{ needs.version.outputs.release_version }}"
  compose-test:
    uses: walt-id/waltid-identity/.github/workflows/reusable/docker-compose-testing.yml@53249535bf6e3d7257e9535ca3e9ff69472542b9
    needs: [ version, docker ]
    secrets: inherit
    with:
      artifact: true
      tag: "${{ needs.version.outputs.release_version }}"
