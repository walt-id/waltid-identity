name: Release on manual push

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version'
        required: true

jobs:
  version:
    uses: walt-id/waltid-identity/.github/workflows/version.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    with:
      preferred: ${{ inputs.release_version }}
  gradle:
    uses: walt-id/waltid-identity/.github/workflows/gradle.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: version
    with:
      version: ${{ needs.version.outputs.release_version }}
      enable-android-build: true
      publish: true
      report-check-name: 'gradle / gradle (ubuntu-22.04)'
  docker-matrix:
    uses: walt-id/waltid-identity/.github/workflows/load-json.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    with:
      jsonpath: ".github/workflows/data/docker-matrix.json"
  docker:
    uses: walt-id/waltid-identity/.github/workflows/docker.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, docker-matrix ]
    with:
      images: ${{ needs.docker-matrix.outputs.json }}
      version: ${{ needs.version.outputs.release_version }}
      tags: '["stable", "latest"]'
      publish: true
  api-docker-matrix:
    uses: walt-id/waltid-identity/.github/workflows/load-json.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    with:
      jsonpath: ".github/workflows/data/api-docker-matrix.json"
  api-docker:
    uses: walt-id/waltid-identity/.github/workflows/api-docker.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, api-docker-matrix ]
    with:
      images: ${{ needs.api-docker-matrix.outputs.json }}
      version: ${{ needs.version.outputs.release_version }}
      tags: '["stable", "latest"]'
      publish: true
  sdk-docs:
    uses: walt-id/waltid-identity/.github/workflows/mobile-sdk-docs.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: version
    with:
      deploy: true
      version: ${{ needs.version.outputs.release_version }}
      tags: '["stable", "latest"]'
  deploy:
    uses: walt-id/waltid-identity/.github/workflows/deployment.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, gradle, docker, api-docker, sdk-docs ]
    with:
      version: ${{ needs.version.outputs.release_version }}
      deployment: ${{ contains(needs.version.outputs.release_version, 'PRE-RELEASE') && 'dev' || 'prod' }}
      oss: ${{ contains(needs.version.outputs.release_version, 'PRE-RELEASE') && 'test-identity-main' || 'identity-main' }}
      enterprise: ${{ contains(needs.version.outputs.release_version, 'PRE-RELEASE') && 'test-enterprise-main' || 'enterprise-main' }}
  deploy-license:
    runs-on: ubuntu-latest
    needs: [ version, api-docker ]
    if: ${{ !contains(needs.version.outputs.release_version, 'PRE-RELEASE') }}
    steps:
      - name: Dispatch license deployment in enterprise repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_ACCESS_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'walt-id',
              repo: 'waltid-identity-enterprise',
              workflow_id: 'deploy-k8s-license.yml',
              ref: 'main',
              inputs: { version: '${{ needs.version.outputs.release_version }}' }
            })
  branch:
    uses: walt-id/waltid-identity/.github/workflows/branch.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, deploy ]
    if: ${{ endsWith(needs.version.outputs.release_version, '.0') && !contains(needs.version.outputs.release_version, 'PRE-RELEASE') }}
    with:
      version: ${{ needs.version.outputs.release_version }}
  enterprise-branch:
    uses: walt-id/waltid-identity/.github/workflows/branch.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, deploy ]
    if: ${{ endsWith(needs.version.outputs.release_version, '.0') && !contains(needs.version.outputs.release_version, 'PRE-RELEASE') }}
    with:
      version: ${{ needs.version.outputs.release_version }}
      repository: walt-id/waltid-identity-enterprise
  docs-branch:
    uses: walt-id/waltid-identity/.github/workflows/branch.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, deploy ]
    if: ${{ endsWith(needs.version.outputs.release_version, '.0') && !contains(needs.version.outputs.release_version, 'PRE-RELEASE') }}
    with:
      version: ${{ needs.version.outputs.release_version }}
      repository: walt-id/waltid-docs
  quickstart-branch:
    uses: walt-id/waltid-identity/.github/workflows/branch.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, deploy ]
    if: ${{ endsWith(needs.version.outputs.release_version, '.0') && !contains(needs.version.outputs.release_version, 'PRE-RELEASE') }}
    with:
      version: ${{ needs.version.outputs.release_version }}
      repository: walt-id/waltid-enterprise-quickstart
  unified-build-branch:
    uses: walt-id/waltid-identity/.github/workflows/branch.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, deploy ]
    if: ${{ endsWith(needs.version.outputs.release_version, '.0') && !contains(needs.version.outputs.release_version, 'PRE-RELEASE') }}
    with:
      version: ${{ needs.version.outputs.release_version }}
      repository: walt-id/waltid-unified-build
  tag:
    uses: walt-id/waltid-identity/.github/workflows/tag.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, deploy ]
    with:
      version: ${{ needs.version.outputs.release_version }}
  enterprise-tag:
    uses: walt-id/waltid-identity/.github/workflows/tag.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, deploy ]
    with:
      version: ${{ needs.version.outputs.release_version }}
      repository: walt-id/waltid-identity-enterprise
  docs-tag:
    uses: walt-id/waltid-identity/.github/workflows/tag.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, deploy ]
    with:
      version: ${{ needs.version.outputs.release_version }}
      repository: walt-id/waltid-docs
  quickstart-tag:
    uses: walt-id/waltid-identity/.github/workflows/tag.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, deploy ]
    with:
      version: ${{ needs.version.outputs.release_version }}
      repository: walt-id/waltid-enterprise-quickstart
  unified-build-tag:
    uses: walt-id/waltid-identity/.github/workflows/tag.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, deploy ]
    with:
      version: ${{ needs.version.outputs.release_version }}
      repository: walt-id/waltid-unified-build
  release:
    uses: walt-id/waltid-identity/.github/workflows/create-release.yml@6bb27c98fb66d9525dcc5ed8b0e703ff07a18c4a
    secrets: inherit
    needs: [ version, tag ]
    with:
      version: ${{ needs.version.outputs.release_version }}
      tag: ${{ needs.tag.outputs.tag }}
  enterprise-release:
    name: Create Enterprise Release
    runs-on: ubuntu-latest
    needs: [ enterprise-tag ]
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          repository: walt-id/waltid-identity-enterprise
          tag_name: ${{ needs.enterprise-tag.outputs.tag }}
          prerelease: ${{ contains(needs.enterprise-tag.outputs.tag, 'PRE-RELEASE') }}
  docs-release:
    name: Create Docs Release
    runs-on: ubuntu-latest
    needs: [ docs-tag ]
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          repository: walt-id/waltid-docs
          tag_name: ${{ needs.docs-tag.outputs.tag }}
          prerelease: ${{ contains(needs.docs-tag.outputs.tag, 'PRE-RELEASE') }}
  quickstart-release:
    name: Create Quickstart Release
    runs-on: ubuntu-latest
    needs: [ quickstart-tag ]
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          repository: walt-id/waltid-enterprise-quickstart
          tag_name: ${{ needs.quickstart-tag.outputs.tag }}
          prerelease: ${{ contains(needs.quickstart-tag.outputs.tag, 'PRE-RELEASE') }}
  unified-build-release:
    name: Create Unified Build Release
    runs-on: ubuntu-latest
    needs: [ unified-build-tag ]
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          repository: walt-id/waltid-unified-build
          tag_name: ${{ needs.unified-build-tag.outputs.tag }}
          prerelease: ${{ contains(needs.unified-build-tag.outputs.tag, 'PRE-RELEASE') }}
