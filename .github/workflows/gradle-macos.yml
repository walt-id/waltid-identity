name: Run gradle build for iOS

on:
  workflow_dispatch:

jobs:
  gradle:
    runs-on: macos-latest
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@f4b7bc25fc78aa4d1c10622e820958e53520b77b
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@f4b7bc25fc78aa4d1c10622e820958e53520b77b

      - name: Build iOS Simulator Framework (ARM64)
        uses: walt-id/waltid-identity/.github/actions/gradle-ios@f4b7bc25fc78aa4d1c10622e820958e53520b77b
        with:
          waltid-directory: 'waltid-identity'