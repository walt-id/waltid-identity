name: iOS build and test

on:
  workflow_dispatch:
  push:

jobs:
  gradle:
    runs-on: macos-26
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@864f84343fdeea17f6f63434bc8036c39f178dc7
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@864f84343fdeea17f6f63434bc8036c39f178dc7

      - name: Build and test iOS
        timeout-minutes: 60
        uses: walt-id/waltid-identity/.github/actions/gradle-ios@a406c94001148a12e7073aff8e7770d32f7c0c96
        with:
          waltid-directory: 'waltid-identity'
          xcode-developer-dir: '/Applications/Xcode_26.5.app/Contents/Developer'
          simulator-destination: 'platform=iOS Simulator,name=iPhone 17,OS=latest'
