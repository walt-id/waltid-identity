name: Run gradle build for iOS

on:
  workflow_dispatch:

jobs:
  gradle:
    runs-on: macos-latest
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@ec7aabf2ab620e825ba2f093b99348a89fac732d
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@ec7aabf2ab620e825ba2f093b99348a89fac732d

      - name: Build iOS Simulator Framework (ARM64)
        uses: walt-id/waltid-identity/.github/actions/gradle-ios@ec7aabf2ab620e825ba2f093b99348a89fac732d
        with:
          waltid-directory: 'waltid-identity'