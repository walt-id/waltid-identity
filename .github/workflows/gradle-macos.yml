name: Run gradle build for iOS

on:
  workflow_dispatch:

jobs:
  gradle:
    runs-on: macos-latest
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@fe85bf41b1b271c7283f765bed84a1af7bfdffff
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@fe85bf41b1b271c7283f765bed84a1af7bfdffff

      - name: Build iOS Simulator Framework (ARM64)
        uses: walt-id/waltid-identity/.github/actions/gradle-ios@fe85bf41b1b271c7283f765bed84a1af7bfdffff
        with:
          waltid-directory: 'waltid-identity'