name: Run gradle build for iOS

on:
  workflow_dispatch:

jobs:
  gradle:
    runs-on: macos-latest
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@ddcd1165a84a4b600794abe5c078cbecd0ac1a8e
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@ddcd1165a84a4b600794abe5c078cbecd0ac1a8e

      - name: Build iOS Simulator Framework (ARM64)
        uses: walt-id/waltid-identity/.github/actions/gradle-ios@ddcd1165a84a4b600794abe5c078cbecd0ac1a8e
        with:
          waltid-directory: 'waltid-identity'