name: Run gradle build for iOS

on:
  workflow_dispatch:

jobs:
  gradle:
    runs-on: macos-latest
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@7de75d6e9b60fd6f749e640f30b29eff24a21567
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@7de75d6e9b60fd6f749e640f30b29eff24a21567

      - name: Build iOS Simulator Framework (ARM64)
        uses: walt-id/waltid-identity/.github/actions/gradle-ios@7de75d6e9b60fd6f749e640f30b29eff24a21567
        with:
          waltid-directory: 'waltid-identity'