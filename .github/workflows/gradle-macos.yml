name: Run gradle build for iOS

on:
  workflow_dispatch:

jobs:
  gradle:
    runs-on: macos-latest
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@a74c2dfdec29f7b0d53d36961b8a01a93f31b0c2
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@a74c2dfdec29f7b0d53d36961b8a01a93f31b0c2

      - name: Build iOS Simulator Framework (ARM64)
        uses: walt-id/waltid-identity/.github/actions/gradle-ios@a74c2dfdec29f7b0d53d36961b8a01a93f31b0c2
        with:
          waltid-directory: 'waltid-identity'