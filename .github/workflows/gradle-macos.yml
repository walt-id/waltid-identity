name: Run gradle build for iOS

on:
  workflow_dispatch:

jobs:
  gradle:
    runs-on: macos-latest
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@71e675114f46d2c5037fb97f72e78e1f4f9849e1
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@71e675114f46d2c5037fb97f72e78e1f4f9849e1

      - name: Build iOS Simulator Framework (ARM64)
        uses: walt-id/waltid-identity/.github/actions/gradle-ios@71e675114f46d2c5037fb97f72e78e1f4f9849e1
        with:
          waltid-directory: 'waltid-identity'