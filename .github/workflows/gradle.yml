name: Build gradle and/or publish (reusable workflow)

on:
  workflow_call:
    inputs:
      version:
        description: "release version"
        required: false
        type: string
      publish:
        description: "Specifies whether to publish the artifacts (defaults to false)"
        required: false
        type: boolean
        default: false

jobs:
  gradle:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-latest disabled until all multiplatform modules set up properly
        # currently configured on workflow dispatch as a separate workflow (gradle-macos)
        os: [ ubuntu-latest ]
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@7de75d6e9b60fd6f749e640f30b29eff24a21567
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@7de75d6e9b60fd6f749e640f30b29eff24a21567

      - name: Start tunnel and get URL
        id: tunnel
        run: |
          # Start tunnel on port 7003
          wget -q -O cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:7003 > lt_output.txt 2>&1 &

          # Wait for tunnel to initialize
          sleep 5

          # Extract the tunnel URL from output
          TUNNEL_URL=$(grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' lt_output.txt | head -n 1)

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            cat lt_output.txt
            TUNNEL_URL=""
          else
            echo "✅ Tunnel URL: $TUNNEL_URL"
          fi

          echo "url=$TUNNEL_URL" >> $GITHUB_OUTPUT
      - name: Replace URLs in Kotlin test
        if: ${{ steps.tunnel.outputs.url != '' }}
        run: |
          FILE="./waltid-identity/waltid-services/waltid-openid4vp-conformance-runners/src/test/kotlin/id/walt/openid4vp/conformance/ConformanceTests.kt"
          sed -i \
            -e "s#https://verifier2.localhost/verification-session#${{ steps.tunnel.outputs.url }}/verification-session#g" \
            -e "s#localhost.emobix.co.uk#conformance.waltid.cloud#g" \
            -e "s#8443#443#g" \
            "$FILE"

      - name: Check if Google Chrome is installed
        id: check-browser
        run: |
          if [ -x /usr/bin/google-chrome ] || [ -x /usr/bin/google-chrome-stable ]; then
            echo "installed=true" >> $GITHUB_OUTPUT
            echo "Google Chrome is already installed"
          else
            echo "installed=false" >> $GITHUB_OUTPUT
            echo "Google Chrome is not installed"
          fi

      - name: Install Google Chrome stable
        if: steps.check-browser.outputs.installed == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | \
            sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Export CHROME_BIN
        run: |
          if [ -x /usr/bin/google-chrome ]; then
            CHROME_BIN=/usr/bin/google-chrome
          elif [ -x /usr/bin/google-chrome-stable ]; then
            CHROME_BIN=/usr/bin/google-chrome-stable
          else
            CHROME_BIN=""
          fi
          if [ -z "$CHROME_BIN" ]; then
            echo "Could not determine Google Chrome binary path"
            exit 1
          fi
          echo "CHROME_BIN=$CHROME_BIN" >> $GITHUB_ENV
          echo "SELENIUM_BROWSER=chrome" >> $GITHUB_ENV
          echo "Using CHROME_BIN=$CHROME_BIN"

      - name: Clean and build with all tests
        if: ${{ runner.os != 'macos' }}
        run: ./gradlew clean build cleanAllTests allTests --rerun-tasks --no-daemon --max-workers=3
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/test/
            **/build/reports/tests/allTests/
          retention-days: 30

      - name: Build iOS Simulator Framework (ARM64)
        if: ${{ runner.os == 'macos'}}
        uses: walt-id/waltid-identity/.github/actions/gradle-ios@7de75d6e9b60fd6f749e640f30b29eff24a21567
        with:
          waltid-directory: 'waltid-identity'

      - name: Set version
        if: ${{ inputs.version != '' && runner.os == 'linux' }}
        run: |
          sed -i "s/1.0.0-SNAPSHOT/${{ inputs.version }}/g" build.gradle.kts

      - name: Publish
        if: ${{ inputs.publish && runner.os == 'linux' }}
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: ./gradlew publish --no-daemon
