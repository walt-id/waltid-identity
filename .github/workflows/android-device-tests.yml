name: Android device tests

on:
  workflow_dispatch:
  push:

jobs:
  android-device-tests:
    runs-on: ubuntu-latest
    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@864f84343fdeea17f6f63434bc8036c39f178dc7
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@864f84343fdeea17f6f63434bc8036c39f178dc7

      - name: Enable Android build in identity repo
        uses: walt-id/waltid-identity/.github/actions/set-properties@00d4e55e9865cf17c6703d926dce4a4f6e1d404a
        with:
          file: 'waltid-identity/gradle.properties'
          properties: 'enableAndroidBuild=true'

      - name: Enable Android build in unified-build root
        uses: walt-id/waltid-identity/.github/actions/set-properties@00d4e55e9865cf17c6703d926dce4a4f6e1d404a
        with:
          file: 'gradle.properties'
          properties: 'enableAndroidBuild=true'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android wallet-mobile and Compose demo integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: >
            set +e;
            ./waltid-identity/gradlew -p waltid-identity :waltid-libraries:protocols:waltid-openid4vc-wallet-mobile:connectedAndroidDeviceTest --info;
            wallet_mobile_status=$?;
            ./waltid-identity/gradlew -p waltid-identity :waltid-applications:waltid-wallet-demo-compose:androidApp:connectedDebugAndroidTest --info -Pandroid.testInstrumentationRunnerArguments.class=id.walt.walletdemo.compose.android.EudiPublicBackendE2ETest;
            compose_demo_status=$?;
            set -e;
            if [ "$wallet_mobile_status" -ne 0 ] || [ "$compose_demo_status" -ne 0 ]; then
              echo "::error::Android device test failures: wallet-mobile=$wallet_mobile_status compose-demo=$compose_demo_status";
              exit 1;
            fi

      - name: Publish Android device test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          update_check: true
          job_name: android-device-tests
          check_name: Android Device Test Report
          report_paths: 'waltid-identity/**/build/outputs/androidTest-results/**/*.xml'
          detailed_summary: true
          include_passed: false
          include_skipped: false
          require_tests: true

      - name: Upload Android device test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-device-test-reports
          path: |
            waltid-identity/**/build/reports/androidTests/**
            waltid-identity/**/build/outputs/androidTest-results/**
          retention-days: 30
