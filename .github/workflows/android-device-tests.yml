name: Android device tests

on:
  workflow_dispatch:
  push:

jobs:
  android-device-tests:
    runs-on: ubuntu-latest
    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
    steps:
      - name: Checkout all repos with ref fallback
        uses: walt-id/waltid-identity/.github/actions/checkout-repos@864f84343fdeea17f6f63434bc8036c39f178dc7
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure gradle
        uses: walt-id/waltid-identity/.github/actions/gradle-setup-action@864f84343fdeea17f6f63434bc8036c39f178dc7

      - name: Enable Android build
        uses: walt-id/waltid-identity/.github/actions/enable-android-build@d33e42ba9a0b37927f588130241e9ae812a2b248
        with:
          gradle-properties-path: 'waltid-identity/gradle.properties'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android wallet-mobile integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            cd waltid-identity
            ./gradlew :waltid-libraries:protocols:waltid-openid4vc-wallet-mobile:connectedAndroidDeviceTest --info

      - name: Upload Android device test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-device-test-reports
          path: |
            waltid-identity/**/build/reports/androidTests/**
            waltid-identity/**/build/outputs/androidTest-results/**
          retention-days: 30
