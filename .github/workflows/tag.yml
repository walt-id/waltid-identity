name: Create tag (reusable workflow)

on:
  workflow_call:
    inputs:
      version:
        description: "release version"
        required: true
        type: string
      repository:
        description: "repository to tag (default: current repo)"
        required: false
        type: string
        default: ${{ github.repository }}
    outputs:
      tag:
        description: "The tag"
        value: ${{ jobs.tag.outputs.result }}

jobs:
  tag:
    name: Git tag
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository }}
          token: ${{ secrets.GH_ACCESS_TOKEN || github.token }}
      - name: Create and push the git tag
        id: tag
        run: |
          tag=v${{ inputs.version }}
          git tag $tag
          git push --tags
          echo "tag=${tag}" >> $GITHUB_OUTPUT
